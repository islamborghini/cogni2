# Stage 1 frozen retrieval benchmark.
#
# Target: django/django @ 1651351386ab31d8ae492c8a4922797714ca97d1 (Django 4.2.3).
# Ground truth ported from the cogni v1 Django task sets and re-verified by direct
# search against a checkout at this exact SHA.
#
# Conventions:
#   - `path` is repo-relative (the eval roots at the repository top, so paths
#     carry the `django/` package prefix).
#   - each `gold` span is the 1-based definition line of the symbol a correct
#     retrieval must surface; a retrieved chunk counts as a hit when its line
#     range overlaps the span (so the method/class chunk containing the def line
#     scores it).
#   - `bucket: localization` => a bounded set of spans answers the query, so
#     recall@10 is meaningful (these form the headline). `bucket: enumeration`
#     => the answer is a large set that cannot fit in 10 chunks by construction;
#     reported for reference only.
#
# This set is intentionally conservative: every gold span is verified. It can
# grow toward 20 as more enumeration tasks get fully labeled.

target_repo: https://github.com/django/django
target_sha: 1651351386ab31d8ae492c8a4922797714ca97d1

tasks:
  - id: slugify-implementation
    query: "How does slugify() in django.utils.text convert a string into a slug? Walk through the Unicode handling, non-alphanumeric stripping, and whitespace steps."
    bucket: localization
    source: v1:explain-slugify-implementation
    gold:
      - {path: django/utils/text.py, start: 420, end: 420}

  - id: wsgi-to-view-trace
    query: "Trace the call chain from WSGIHandler.__call__ down to where the user's view is invoked, listing each intermediate handler method in order."
    bucket: localization
    source: v1:wsgi-to-view-trace
    gold:
      - {path: django/core/handlers/wsgi.py, start: 120, end: 120}
      - {path: django/core/handlers/base.py, start: 136, end: 136}
      - {path: django/core/handlers/base.py, start: 174, end: 174}
      - {path: django/core/handlers/base.py, start: 345, end: 345}

