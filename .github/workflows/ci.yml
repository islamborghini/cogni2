name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # CGO is required for tree-sitter; the runners ship a C toolchain.
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: vet
        run: go vet ./...

      - name: build
        run: go build ./...

      # The eval harness lives behind the `eval` build tag and never runs in CI
      # (it needs a Voyage key + a pinned Django checkout). We still compile it
      # so the gated code can't silently rot.
      - name: build (eval tag)
        run: go build -tags eval ./...

      - name: test
        run: go test -race ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Build golangci-lint with the repo's own Go toolchain. The prebuilt
      # release binaries lag the Go version go.mod targets, and golangci-lint
      # refuses to run when it was built with an older Go than the target.
      - name: install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      - name: lint
        run: golangci-lint run --timeout 5m
